<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#C81E5E" />

    <!-- Primary meta -->
    <title>Haibo! — Safety for South Africa's taxis</title>
    <meta
      name="description"
      content="SOS, rank finder, cashless fares, group rides and community alerts for the 15 million commuters who rely on South African minibus taxis every day."
    />

    <!-- Open Graph (Facebook / WhatsApp / LinkedIn / Slack) -->
    <meta property="og:site_name" content="Haibo!" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Haibo! — Safety for South Africa's taxis" />
    <meta
      property="og:description"
      content="SOS, rank finder, cashless fares, group rides and community alerts for South Africa's minibus taxi commuters."
    />
    <meta property="og:image" content="/logo.svg" />
    <meta property="og:image:alt" content="Haibo!" />
    <meta property="og:locale" content="en_ZA" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Haibo! — Safety for South Africa's taxis" />
    <meta
      name="twitter:description"
      content="SOS, rank finder, cashless fares, group rides and community alerts for South Africa's minibus taxi commuters."
    />
    <meta name="twitter:image" content="/logo.svg" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #F5F6F8;
        color: #1A1A1F;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        font-feature-settings: "cv02", "cv03", "cv04", "cv11";
      }
      h1, h2, h3, h4, h5, h6 {
        font-family: 'Space Grotesk', 'Inter', -apple-system, sans-serif;
        letter-spacing: -0.01em;
      }
      input, button, textarea, select {
        font-family: inherit;
      }
      ::selection {
        background: rgba(200, 30, 94, 0.18);
        color: #1A1A1F;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

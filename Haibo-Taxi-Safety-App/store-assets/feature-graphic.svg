<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500" width="1024" height="500" role="img" aria-labelledby="title desc">
  <title id="title">Haibo! — Safety for South Africa's taxis</title>
  <desc id="desc">Google Play feature graphic, 1024x500. Brand gradient background with wordmark, tagline, and stylised phone showing the SOS screen.</desc>

  <defs>
    <!-- Primary brand gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E72369"/>
      <stop offset="55%" stop-color="#D42281"/>
      <stop offset="100%" stop-color="#0C121A"/>
    </linearGradient>

    <!-- Phone screen gradient -->
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#14151A"/>
      <stop offset="100%" stop-color="#0C121A"/>
    </linearGradient>

    <!-- SOS button pulse gradient -->
    <radialGradient id="sos" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FF2E6A"/>
      <stop offset="100%" stop-color="#C21725"/>
    </radialGradient>

    <!-- Dotted texture pattern -->
    <pattern id="dots" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="rgba(255,255,255,0.06)"/>
    </pattern>

    <!-- Soft shadow for phone -->
    <filter id="phoneShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="500" fill="url(#bg)"/>
  <rect width="1024" height="500" fill="url(#dots)"/>

  <!-- Diagonal highlight bar (subtle brand accent) -->
  <polygon points="0,0 420,0 280,500 0,500" fill="#FFFFFF" opacity="0.04"/>

  <!-- LEFT: Wordmark + tagline -->
  <g transform="translate(56,138)">
    <!-- Logo dot -->
    <circle cx="20" cy="40" r="18" fill="#FFFFFF"/>
    <circle cx="20" cy="40" r="10" fill="#E72369"/>

    <!-- Wordmark -->
    <text x="58" y="60"
          font-family="Space Grotesk, Nunito, system-ui, -apple-system, Helvetica, Arial, sans-serif"
          font-size="84"
          font-weight="800"
          fill="#FFFFFF"
          letter-spacing="-2">Haibo!</text>

    <!-- Tagline line 1 -->
    <text x="0" y="140"
          font-family="Space Grotesk, Nunito, system-ui, -apple-system, sans-serif"
          font-size="38"
          font-weight="700"
          fill="#FFFFFF">Safety for South</text>
    <text x="0" y="186"
          font-family="Space Grotesk, Nunito, system-ui, -apple-system, sans-serif"
          font-size="38"
          font-weight="700"
          fill="#FFFFFF">Africa's taxis.</text>

    <!-- Sub tagline -->
    <text x="0" y="232"
          font-family="Nunito, DM Sans, system-ui, -apple-system, sans-serif"
          font-size="18"
          font-weight="500"
          fill="rgba(255,255,255,0.82)">SOS · Rank finder · Fares · Community</text>

    <!-- Commuter count pill -->
    <g transform="translate(0,264)">
      <rect x="0" y="0" width="214" height="42" rx="21" ry="21"
            fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
      <text x="20" y="28"
            font-family="Nunito, system-ui, sans-serif"
            font-size="15"
            font-weight="700"
            fill="#FFFFFF"
            letter-spacing="0.6">BUILT FOR 15M COMMUTERS</text>
    </g>
  </g>

  <!-- RIGHT: Stylised phone -->
  <g transform="translate(648,50)" filter="url(#phoneShadow)">
    <!-- Phone chassis -->
    <rect x="0" y="0" width="280" height="400" rx="38" ry="38"
          fill="#0C121A" stroke="#1F222A" stroke-width="3"/>
    <!-- Screen -->
    <rect x="12" y="12" width="256" height="376" rx="28" ry="28" fill="url(#screen)"/>

    <!-- Status bar -->
    <rect x="108" y="18" width="64" height="10" rx="5" fill="#000" opacity="0.85"/>

    <!-- App header -->
    <text x="32" y="74"
          font-family="Space Grotesk, Nunito, system-ui, sans-serif"
          font-size="13"
          font-weight="700"
          fill="rgba(255,255,255,0.6)"
          letter-spacing="1">EMERGENCY</text>
    <text x="32" y="104"
          font-family="Space Grotesk, Nunito, system-ui, sans-serif"
          font-size="22"
          font-weight="700"
          fill="#FFFFFF">Hold to send SOS</text>

    <!-- SOS button -->
    <circle cx="140" cy="222" r="84" fill="url(#sos)"/>
    <circle cx="140" cy="222" r="84" fill="none" stroke="#FF2E6A" stroke-width="3" opacity="0.6"/>
    <circle cx="140" cy="222" r="102" fill="none" stroke="#FF2E6A" stroke-width="2" opacity="0.25"/>
    <circle cx="140" cy="222" r="120" fill="none" stroke="#FF2E6A" stroke-width="1" opacity="0.12"/>
    <text x="140" y="232"
          font-family="Space Grotesk, Nunito, system-ui, sans-serif"
          font-size="44"
          font-weight="800"
          fill="#FFFFFF"
          text-anchor="middle"
          letter-spacing="2">SOS</text>

    <!-- Footer row: location + signal -->
    <g transform="translate(0,342)">
      <circle cx="36" cy="0" r="5" fill="#2F9F3D"/>
      <text x="50" y="5"
            font-family="Nunito, system-ui, sans-serif"
            font-size="12"
            font-weight="600"
            fill="rgba(255,255,255,0.78)">Location locked</text>
      <text x="244" y="5"
            font-family="Nunito, system-ui, sans-serif"
            font-size="12"
            font-weight="600"
            fill="rgba(255,255,255,0.55)"
            text-anchor="end">3 contacts</text>
    </g>
  </g>
</svg>

name: Deploy API to Azure

on:
  push:
    branches: [main]
    paths:
      - 'Haibo-Taxi-Safety-App/server/**'
      - 'Haibo-Taxi-Safety-App/shared/**'
      - 'Haibo-Taxi-Safety-App/package.json'

  workflow_dispatch: # Allow manual trigger

env:
  AZURE_WEBAPP_NAME: haibo-api-prod
  NODE_VERSION: '22.x'

jobs:
  deploy:
    name: Build & Deploy to Azure
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Haibo-Taxi-Safety-App

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: Haibo-Taxi-Safety-App/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type check server
        run: npx tsc --noEmit --project server/tsconfig.json
        continue-on-error: true

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: ./Haibo-Taxi-Safety-App

      - name: Health check
        run: |
          echo "Waiting 30s for deployment to warm up..."
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/api/health)
          if [ "$STATUS" = "200" ]; then
            echo "Health check passed (HTTP $STATUS)"
          else
            echo "Health check failed (HTTP $STATUS)"
            exit 1
          fi
